name: Thursday Weekly Overview

on:
  schedule:
    # 06:00 UTC = 08:00 Berlin (CEST/summer). In winter (CET) this runs at 07:00 Berlin.
    - cron: "0 6 * * 4"
  workflow_dispatch:  # allow manual trigger for testing

permissions:
  contents: write   # needed to commit state.json back to the repo

jobs:
  send-overview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly overview email
        env:
          OPENRESA_USERNAME: ${{ secrets.OPENRESA_USERNAME }}
          OPENRESA_PASSWORD: ${{ secrets.OPENRESA_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --mode=weekly

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: activate monitoring (Thursday weekly run)"
          git push
