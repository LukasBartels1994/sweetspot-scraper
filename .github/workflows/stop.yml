name: Sunday Stop Monitoring

on:
  schedule:
    # 20:00 UTC = 22:00 Berlin (CEST/summer). In winter (CET) this runs at 21:00 Berlin.
    - cron: "0 20 * * 0"
  workflow_dispatch:  # allow manual trigger for testing

permissions:
  contents: write   # needed to commit state.json back to the repo

jobs:
  stop-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deactivate monitoring
        run: python main.py --mode=stop

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: deactivate monitoring (Sunday stop)"
          git push
