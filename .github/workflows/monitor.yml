name: Weekend Slot Monitor (every 30min)

on:
  schedule:
    # Every 30 minutes on Friday (5), Saturday (6), and Sunday (0)
    - cron: "*/30 * * * 5"
    - cron: "*/30 * * * 6"
    - cron: "*/30 * * * 0"
  workflow_dispatch:  # allow manual trigger for testing

permissions:
  contents: write   # needed to commit state.json back to the repo

jobs:
  check-slots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new slots
        env:
          OPENRESA_USERNAME: ${{ secrets.OPENRESA_USERNAME }}
          OPENRESA_PASSWORD: ${{ secrets.OPENRESA_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --mode=monitor

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update slot state [skip ci]"
          git push
